<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCFCFA" />
      <stop offset="100%" stop-color="#F5E6CC" />
    </linearGradient>
    <linearGradient id="sugarGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#78350F" />
      <stop offset="60%" stop-color="#B45309" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="bowlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#854D0E" />
      <stop offset="100%" stop-color="#451A03" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80" />
      <stop offset="100%" stop-color="#15803D" />
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  
  <!-- Decorative leaf design in background -->
  <path d="M 0 100 C 150 150, 250 50, 400 120 L 400 0 L 0 0 Z" fill="#EAF5E1" opacity="0.6"/>
  
  <!-- Sugarcane Stalks in background -->
  <g opacity="0.8" transform="translate(40, -20)">
    <!-- Sugarcane 1 -->
    <rect x="280" y="50" width="16" height="250" rx="4" fill="#65A30D" />
    <line x1="280" y1="100" x2="296" y2="100" stroke="#4D7C0F" stroke-width="2" />
    <line x1="280" y1="160" x2="296" y2="160" stroke="#4D7C0F" stroke-width="2" />
    <line x1="280" y1="220" x2="296" y2="220" stroke="#4D7C0F" stroke-width="2" />
    <!-- Sugarcane 2 -->
    <rect x="310" y="30" width="18" height="280" rx="4" fill="#4D7C0F" />
    <line x1="310" y1="90" x2="328" y2="90" stroke="#365314" stroke-width="2" />
    <line x1="310" y1="150" x2="328" y2="150" stroke="#365314" stroke-width="2" />
    <line x1="310" y1="210" x2="328" y2="210" stroke="#365314" stroke-width="2" />
    <!-- Leaves -->
    <path d="M 310 90 C 250 50, 200 80, 180 120 C 210 100, 260 90, 310 90 Z" fill="url(#leafGrad)" />
    <path d="M 320 150 C 270 120, 220 150, 200 200 C 230 180, 280 160, 320 150 Z" fill="url(#leafGrad)" />
  </g>

  <!-- Wooden Bowl -->
  <ellipse cx="200" cy="270" rx="110" ry="45" fill="url(#bowlGrad)" filter="drop-shadow(0px 8px 16px rgba(0,0,0,0.15))" />
  
  <!-- Sugar Mound inside bowl -->
  <path d="M 105 258 C 110 210, 140 160, 200 160 C 260 160, 290 210, 295 258 Z" fill="url(#sugarGrad)" />
  
  <!-- Sugar Crystals details -->
  <circle cx="160" cy="210" r="2.5" fill="#FBBF24" opacity="0.9" />
  <circle cx="180" cy="190" r="3" fill="#FCD34D" opacity="0.9" />
  <circle cx="210" cy="180" r="2" fill="#FBBF24" opacity="0.9" />
  <circle cx="230" cy="200" r="2.5" fill="#FCD34D" opacity="0.9" />
  <circle cx="200" cy="215" r="3.5" fill="#FCD34D" opacity="0.8" />
  
  <circle cx="140" cy="230" r="3" fill="#F59E0B" />
  <circle cx="155" cy="245" r="2" fill="#FCD34D" />
  <circle cx="245" cy="235" r="3.5" fill="#F59E0B" />
  <circle cx="260" cy="220" r="2" fill="#FCD34D" />
  
  <!-- Spilled Sugar at front -->
  <path d="M 120 280 C 130 290, 160 295, 180 290 C 170 282, 140 280, 120 280 Z" fill="#B45309" />
  <circle cx="135" cy="288" r="2" fill="#FCD34D" />
  <circle cx="150" cy="292" r="1.5" fill="#F59E0B" />
  <circle cx="165" cy="289" r="2" fill="#FCD34D" />

  <path d="M 280 280 C 270 290, 240 295, 220 290 C 230 282, 260 280, 280 280 Z" fill="#B45309" />
  <circle cx="265" cy="288" r="2" fill="#FCD34D" />
  <circle cx="250" cy="292" r="1.5" fill="#F59E0B" />
  <circle cx="235" cy="289" r="2" fill="#FCD34D" />

  <!-- Premium Badge overlay -->
  <rect x="130" y="320" width="140" height="28" rx="14" fill="#15803D" filter="drop-shadow(0px 4px 8px rgba(0,0,0,0.1))"/>
  <text x="200" y="338" font-family="'Inter', 'Outfit', sans-serif" font-size="10" font-weight="900" fill="#FFFFFF" letter-spacing="1.5" text-anchor="middle">100% ORGANIC</text>
  
  <!-- Brand text overlay -->
  <text x="200" y="80" font-family="'Playfair Display', serif" font-size="28" font-weight="900" fill="#1E293B" text-anchor="middle">Irai Organic</text>
  <text x="200" y="105" font-family="'Inter', sans-serif" font-size="11" font-weight="700" fill="#15803D" letter-spacing="3" text-anchor="middle">NATTU SARKARAI</text>
</svg>
